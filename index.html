<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Singapore EC Eligibility Checker</title>

<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet">

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --teal-50:#E1F5EE; --teal-100:#9FE1CB; --teal-400:#1D9E75; --teal-600:#0F6E56; --teal-800:#085041;
  --red-50:#FCEBEB; --red-100:#F7C1C1; --red-800:#791F1F;
  --amber-50:#FAEEDA; --amber-100:#FAC775; --amber-800:#633806;
  --gray-50:#F8F7F4; --gray-100:#EDEDEA; --gray-200:#D8D6D0; --gray-500:#888780; --gray-800:#2C2C2A;
  --font-body:'DM Sans',sans-serif;
  --font-display:'DM Serif Display',serif;
  --radius-md:10px; --radius-lg:16px;
}

body {
  font-family:var(--font-body);
  background:var(--gray-50);
  color:var(--gray-800);
}

header {
  background:#0F6E56;
  color:white;
  text-align:center;
  padding:2rem;
}

header h1 {
  font-family:var(--font-display);
  font-size:2rem;
}

.tab-bar {
  background:#085041;
  display:flex;
  max-width:640px;
  margin:0 auto;
}

.tab-btn {
  flex:1;
  padding:12px;
  border:none;
  background:none;
  color:rgba(255,255,255,0.6);
  cursor:pointer;
}

.tab-btn.active {
  color:white;
  border-bottom:2px solid #9FE1CB;
}

.container {
  max-width:640px;
  margin:auto;
  padding:1rem;
}

.panel { display:none; }
.panel.active { display:block; }

.calc-card {
  background:white;
  border:1px solid var(--gray-200);
  border-radius:var(--radius-lg);
  padding:1.5rem;
  margin-top:1rem;
}

.result-card {
  padding:1rem;
  border-radius:var(--radius-lg);
  margin-bottom:12px;
}

.result-card.eligible { background:var(--teal-50); }
.result-card.conditional { background:var(--amber-50); }

.result-title {
  font-family:var(--font-display);
  margin-bottom:6px;
}

.result-body { font-size:14px; }

.options { display:flex; flex-direction:column; gap:8px; }

.opt {
  padding:10px;
  border:1px solid var(--gray-200);
  border-radius:var(--radius-md);
  cursor:pointer;
}

.opt.selected {
  border-color:var(--teal-400);
  background:var(--teal-50);
}

.nav { margin-top:1rem; }

button {
  padding:8px 16px;
  border:none;
  border-radius:6px;
  background:var(--teal-400);
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
  <h1>Singapore EC Checker</h1>
</header>

<div class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('eligibility', this)">Eligibility</button>
  <button class="tab-btn" onclick="switchTab('grant', this)">Grant</button>
  <button class="tab-btn" onclick="switchTab('process', this)">Process</button>
</div>

<div class="container">

<!-- PANEL 1 -->
<div class="panel active" id="panel-eligibility">
  <div id="questionnaire"></div>
</div>

<!-- PANEL 2 -->
<div class="panel" id="panel-grant">
  <div class="calc-card">
    <label>Income</label>
    <input type="range" min="1000" max="16000" value="8000" id="income" oninput="calcGrant()">
    <div id="grantResult"></div>
  </div>
</div>

<!-- PANEL 3 -->
<div class="panel" id="panel-process">

  <div class="calc-card">
    <div class="result-title">Buying Process</div>

    <div class="result-card eligible">
      <div class="result-title">1. Launch</div>
      <div class="result-body">Check eligibility & finances</div>
    </div>

    <div class="result-card eligible">
      <div class="result-title">2. Apply</div>
      <div class="result-body">Ballot / first-come</div>
    </div>

    <div class="result-card eligible">
      <div class="result-title">3. Book</div>
      <div class="result-body">Pay 5%</div>
    </div>

    <div class="result-card eligible">
      <div class="result-title">4. Sign</div>
      <div class="result-body">Pay 15% + fees</div>
    </div>

    <div class="result-card eligible">
      <div class="result-title">5. Keys</div>
      <div class="result-body">Collect unit</div>
    </div>
  </div>

  <div class="calc-card">
    <div class="result-title">After Buying</div>

    <div class="result-card conditional">
      <div class="result-title">5-Year MOP</div>
      <div class="result-body">Cannot sell or rent whole unit</div>
    </div>

    <div class="result-card conditional">
      <div class="result-title">No Private Property</div>
      <div class="result-body">During MOP</div>
    </div>

    <div class="result-card eligible">
      <div class="result-title">After 10 Years</div>
      <div class="result-body">Fully privatized</div>
    </div>

  </div>

</div>

</div>

<script>

/* TAB */
function switchTab(name, btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('panel-'+name).classList.add('active');
  btn.classList.add('active');
}

/* SIMPLE QUESTIONNAIRE */
let step = 0;
let answers = {};

const questions = [
  {q:"Are you Singapore Citizen?", key:"citizen", options:["Yes","No"]},
  {q:"Income below 16k?", key:"income", options:["Yes","No"]}
];

function renderQ(){
  let q = questions[step];
  let html = `<div class="calc-card"><div class="result-title">${q.q}</div><div class="options">`;

  q.options.forEach(o=>{
    html += `<div class="opt" onclick="select('${q.key}','${o}')">${o}</div>`;
  });

  html += `</div></div>`;
  document.getElementById('questionnaire').innerHTML = html;
}

function select(key,val){
  answers[key]=val;
  step++;
  if(step<questions.length) renderQ();
  else showResult();
}

function showResult(){
  let eligible = answers.citizen==="Yes" && answers.income==="Yes";
  document.getElementById('questionnaire').innerHTML = `
    <div class="calc-card">
      <div class="result-title">${eligible?"Likely Eligible":"Not Eligible"}</div>
    </div>`;
}

/* GRANT */
function calcGrant(){
  let income = document.getElementById('income').value;
  let grant = income<=10000?30000:0;
  document.getElementById('grantResult').innerHTML = "$"+grant;
}

renderQ();
calcGrant();

</script>

</body>
</html>
